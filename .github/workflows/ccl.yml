name: CCL Transactions Export

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD) — defaults to yesterday"
        required: false
        default: ""
      end_date:
        description: "End date (YYYY-MM-DD) — defaults to yesterday"
        required: false
        default: ""

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install playwright playwright-stealth boto3 botocore requests

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run CCL export
        env:
          CI: "true"
          CCL_USERNAME:          ${{ secrets.CCL_USERNAME }}
          CCL_PASSWORD:          ${{ secrets.CCL_PASSWORD }}
          SLACK_BOT_TOKEN:       ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID:         ${{ secrets.SLACK_USER_ID }}
          S3_ENABLED:            ${{ secrets.S3_ENABLED }}
          S3_BUCKET:             ${{ secrets.S3_BUCKET }}
          S3_CCL_PREFIX:         ${{ secrets.S3_CCL_PREFIX }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            ARGS="$ARGS --start_date ${{ github.event.inputs.start_date }}"
          fi
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --end_date ${{ github.event.inputs.end_date }}"
          fi
          python ccl_export.py $ARGS

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ccl-transactions-csv
          path: downloads/*.csv
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload debug screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ccl-debug-screenshots
          path: ccl_dbg_*.png
          if-no-files-found: ignore
          retention-days: 7
