name: CCL Login

on:
  workflow_dispatch:

jobs:
  ccl-login:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CCL_USERNAME: ${{ secrets.CCL_USERNAME }}
      CCL_PASSWORD: ${{ secrets.CCL_PASSWORD }}
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run CCL login
        run: python ccl_login.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ccl-login-screenshots-${{ github.run_id }}
          path: ccl_dbg_*.png
          retention-days: 7
